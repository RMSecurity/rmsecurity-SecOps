# =============================================================================
# CCOS — Pre-commit Hook Configuration
# rmsecurity
# =============================================================================
# Runs automatically before every git commit.
# Blocks secrets, enforces formatting, and validates structure.
# Install: pip install pre-commit && pre-commit install
# =============================================================================

repos:

  # Secret detection — blocks API keys, passwords, tokens before they commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Detect secrets with gitleaks

  # General hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=5120]        # block files over 5MB
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        exclude: ^(CCOS/)?node_modules/
